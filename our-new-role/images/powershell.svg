<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- PowerShell logo -->
  <defs>
    <linearGradient id="ps" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5391FE"/>
      <stop offset="100%" stop-color="#2B5797"/>
    </linearGradient>
  </defs>
  <rect x="16" y="40" width="224" height="176" rx="20" fill="url(#ps)"/>
  <!-- Prompt chevron > -->
  <path d="M60 80 L130 128 L60 176" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Underscore _ -->
  <line x1="140" y1="176" x2="200" y2="176" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
</svg>
