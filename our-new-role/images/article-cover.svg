<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#EDE8E0"/>
      <stop offset="100%" stop-color="#E0DAD0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg2)"/>

  <!-- Watercolor washes -->
  <ellipse cx="400" cy="340" rx="300" ry="220" fill="#C8CCD8" opacity="0.3"/>
  <ellipse cx="200" cy="200" rx="160" ry="110" fill="#8B9DAE" opacity="0.2"/>
  <ellipse cx="600" cy="520" rx="180" ry="130" fill="#D4B896" opacity="0.25"/>

  <!-- Central conductor figure — large, bold -->
  <!-- Platform shadow -->
  <ellipse cx="400" cy="485" rx="55" ry="10" fill="#9A9490" opacity="0.25"/>

  <!-- Figure — thicker strokes for small display -->
  <circle cx="400" cy="290" r="32" fill="#EDE8E0" stroke="#2E333B" stroke-width="4"/>
  <line x1="400" y1="322" x2="400" y2="430" stroke="#2E333B" stroke-width="4"/>
  <!-- Legs -->
  <line x1="400" y1="430" x2="372" y2="480" stroke="#2E333B" stroke-width="4"/>
  <line x1="400" y1="430" x2="428" y2="480" stroke="#2E333B" stroke-width="4"/>
  <!-- Arms raised — conducting -->
  <line x1="400" y1="360" x2="310" y2="310" stroke="#2E333B" stroke-width="4"/>
  <line x1="400" y1="360" x2="490" y2="300" stroke="#2E333B" stroke-width="4"/>
  <!-- Baton in right hand -->
  <line x1="490" y1="300" x2="524" y2="268" stroke="#C9A04F" stroke-width="3.5"/>
  <circle cx="526" cy="266" r="4" fill="#C9A04F"/>

  <!-- Agent circles — larger, bolder for readability -->
  <!-- Left agents -->
  <g>
    <circle cx="130" cy="260" r="42" fill="#E8E2D8" stroke="#4A5868" stroke-width="2.5"/>
    <text x="130" y="254" fill="#2E333B" font-size="13" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">git push</text>
    <text x="130" y="274" fill="#4A5868" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">CI/CD</text>
    <line x1="172" y1="262" x2="310" y2="310" stroke="#6B7D8E" stroke-width="2" stroke-dasharray="5 4" opacity="0.45"/>
  </g>

  <g>
    <circle cx="165" cy="430" r="42" fill="#E8E2D8" stroke="#4A5868" stroke-width="2.5"/>
    <text x="165" y="424" fill="#2E333B" font-size="13" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">assert</text>
    <text x="165" y="444" fill="#4A5868" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">TEST</text>
    <line x1="207" y1="425" x2="375" y2="400" stroke="#6B7D8E" stroke-width="2" stroke-dasharray="5 4" opacity="0.45"/>
  </g>

  <g>
    <circle cx="210" cy="590" r="42" fill="#E8E2D8" stroke="#4A5868" stroke-width="2.5"/>
    <text x="210" y="584" fill="#2E333B" font-size="13" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">## docs</text>
    <text x="210" y="604" fill="#4A5868" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">DOCS</text>
    <line x1="242" y1="564" x2="385" y2="450" stroke="#6B7D8E" stroke-width="2" stroke-dasharray="5 4" opacity="0.45"/>
  </g>

  <!-- Right agents -->
  <g>
    <circle cx="670" cy="260" r="42" fill="#E8E2D8" stroke="#4A5868" stroke-width="2.5"/>
    <text x="670" y="254" fill="#2E333B" font-size="13" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">func()</text>
    <text x="670" y="274" fill="#4A5868" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">CODE</text>
    <line x1="628" y1="262" x2="490" y2="300" stroke="#6B7D8E" stroke-width="2" stroke-dasharray="5 4" opacity="0.45"/>
  </g>

  <g>
    <circle cx="635" cy="430" r="42" fill="#E8E2D8" stroke="#4A5868" stroke-width="2.5"/>
    <text x="635" y="424" fill="#2E333B" font-size="13" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">scan()</text>
    <text x="635" y="444" fill="#4A5868" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">SEC</text>
    <line x1="593" y1="425" x2="425" y2="400" stroke="#6B7D8E" stroke-width="2" stroke-dasharray="5 4" opacity="0.45"/>
  </g>

  <g>
    <circle cx="590" cy="590" r="42" fill="#E8E2D8" stroke="#4A5868" stroke-width="2.5"/>
    <text x="590" y="584" fill="#2E333B" font-size="13" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">review</text>
    <text x="590" y="604" fill="#4A5868" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">REVIEW</text>
    <line x1="558" y1="564" x2="415" y2="450" stroke="#6B7D8E" stroke-width="2" stroke-dasharray="5 4" opacity="0.45"/>
  </g>

  <!-- Speech bubbles — bolder -->
  <g transform="translate(300, 248)">
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#E8D5A0" opacity="0.75" stroke="#B8982C" stroke-width="1.5"/>
    <text x="0" y="5" fill="#6B5A20" font-size="16" font-family="Georgia,serif" text-anchor="middle" font-weight="700">...</text>
  </g>
  <g transform="translate(508, 240)">
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#E8D5A0" opacity="0.75" stroke="#B8982C" stroke-width="1.5"/>
    <text x="0" y="5" fill="#6B5A20" font-size="16" font-family="Georgia,serif" text-anchor="middle" font-weight="700">...</text>
  </g>

  <!-- Signpost top — bolder -->
  <g transform="translate(400, 130)">
    <line x1="0" y1="-45" x2="0" y2="45" stroke="#2E333B" stroke-width="4" opacity="0.4"/>
    <g transform="translate(0,-22) rotate(-10)">
      <path d="M -5 -12 L 58 -12 L 70 0 L 58 12 L -5 12 Z" fill="#4A5868" opacity="0.35"/>
    </g>
    <g transform="translate(0,8) rotate(8)">
      <path d="M 5 -12 L -58 -12 L -70 0 L -58 12 L 5 12 Z" fill="#C9A04F" opacity="0.35"/>
    </g>
  </g>

  <!-- Bottom timeline — bolder, with Claude figure -->
  <line x1="80" y1="720" x2="720" y2="720" stroke="#9A9490" stroke-width="2.5" opacity="0.4"/>

  <circle cx="160" cy="720" r="5" fill="#9A9490" opacity="0.5"/>
  <text x="160" y="748" fill="#6B6560" font-size="12" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">1960</text>

  <circle cx="320" cy="720" r="5" fill="#6B7D8E" opacity="0.6"/>
  <text x="320" y="748" fill="#4A5868" font-size="12" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">1985</text>

  <circle cx="480" cy="720" r="5" fill="#4A5868" opacity="0.7"/>
  <text x="480" y="748" fill="#3A3F4A" font-size="12" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="600">2012</text>

  <!-- 2026 node — with Claude pixel figure above -->
  <circle cx="640" cy="720" r="7" fill="#F8991D" opacity="0.9"/>
  <circle cx="640" cy="720" r="12" fill="none" stroke="#F8991D" stroke-width="1.5" opacity="0.35"/>
  <text x="640" y="748" fill="#F8991D" font-size="12" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="700">2026</text>

  <!-- Claude pixel figure above 2026 -->
  <g transform="translate(622, 660)">
    <!-- Body -->
    <rect x="0" y="0" width="36" height="5" rx="1" fill="#F8991D"/>
    <rect x="0" y="5" width="36" height="5" fill="#F8991D"/>
    <!-- Eyes row -->
    <rect x="0" y="10" width="10" height="5" fill="#F8991D"/>
    <rect x="10" y="10" width="5" height="5" fill="#3A3F4A"/>
    <rect x="15" y="10" width="6" height="5" fill="#F8991D"/>
    <rect x="21" y="10" width="5" height="5" fill="#3A3F4A"/>
    <rect x="26" y="10" width="10" height="5" fill="#F8991D"/>
    <!-- Body lower -->
    <rect x="0" y="15" width="36" height="5" fill="#F8991D"/>
    <rect x="0" y="20" width="36" height="5" fill="#F8991D"/>
    <!-- Legs -->
    <rect x="2" y="25" width="6" height="5" fill="#F8991D"/>
    <rect x="14" y="25" width="6" height="5" fill="#F8991D"/>
    <rect x="28" y="25" width="6" height="5" fill="#F8991D"/>
  </g>
</svg>
