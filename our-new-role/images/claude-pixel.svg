<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 9 7" width="36" height="28" shape-rendering="crispEdges">
  <!-- Claude Code pixel mascot - transparent background -->
  <!-- Head/body row 1 -->
  <rect x="1" y="0" width="7" height="1" fill="#da7756"/>
  <!-- Head/body row 2 -->
  <rect x="1" y="1" width="7" height="1" fill="#da7756"/>
  <!-- Eyes row -->
  <rect x="1" y="2" width="2" height="1" fill="#da7756"/>
  <rect x="3" y="2" width="1" height="1" fill="#1a1a2e"/>
  <rect x="4" y="2" width="1" height="1" fill="#da7756"/>
  <rect x="5" y="2" width="1" height="1" fill="#1a1a2e"/>
  <rect x="6" y="2" width="2" height="1" fill="#da7756"/>
  <!-- Body row 4 -->
  <rect x="1" y="3" width="7" height="1" fill="#da7756"/>
  <!-- Body row 5 -->
  <rect x="1" y="4" width="7" height="1" fill="#da7756"/>
  <!-- Legs -->
  <rect x="1" y="5" width="1" height="1" fill="#da7756"/>
  <rect x="3" y="5" width="1" height="1" fill="#da7756"/>
  <rect x="5" y="5" width="1" height="1" fill="#da7756"/>
  <rect x="7" y="5" width="1" height="1" fill="#da7756"/>
</svg>
