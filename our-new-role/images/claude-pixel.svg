<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 11 7" width="44" height="28" shape-rendering="crispEdges">
  <!-- Claude Code pixel mascot - transparent background -->
  <!-- Body (solid block) -->
  <rect x="2" y="0" width="7" height="5" fill="#da7756"/>
  <!-- Eyes (thinner, further apart, half-eye higher) -->
  <rect x="3.83" y="1.5" width="0.67" height="1" fill="#1a1a2e"/>
  <rect x="6.5" y="1.5" width="0.67" height="1" fill="#1a1a2e"/>
  <!-- Arms (half arm-width lower, at y=2.5) -->
  <rect x="1" y="2.5" width="1" height="1" fill="#da7756"/>
  <rect x="9" y="2.5" width="1" height="1" fill="#da7756"/>
  <!-- Legs (width 0.67, spaced 0.67 from edge and between) -->
  <rect x="2.67" y="5" width="0.67" height="1" fill="#da7756"/>
  <rect x="4" y="5" width="0.67" height="1" fill="#da7756"/>
  <rect x="6.33" y="5" width="0.67" height="1" fill="#da7756"/>
  <rect x="7.67" y="5" width="0.67" height="1" fill="#da7756"/>
</svg>
