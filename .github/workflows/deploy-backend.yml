name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'MsdosApi/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Test
        run: dotnet test MsdosApi.Tests/MsdosApi.Tests.csproj

      - name: Publish
        run: dotnet publish MsdosApi/MsdosApi.csproj -c Release -o publish --no-restore

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: publish
